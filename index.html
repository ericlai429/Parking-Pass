<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永青營造 - 停車通過檢查系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        mono: ['SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @media (min-width: 640px) {
            .iphone-13-frame {
                width: 390px;
                height: min(844px, 90vh);
                border: 12px solid #1e293b; border-radius: 48px;
                position: relative;
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                overflow: hidden;
                box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            }
        }
        @media (max-width: 639px) {
            .iphone-13-frame {
                width: 100%; height: 100vh; border: none; border-radius: 0;
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); }
        }
        .pass-glow { animation: pulse-glow 2s infinite ease-in-out; }
        @keyframes pulse-glow-red {
            0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        }
        .fail-glow { animation: pulse-glow-red 2s infinite ease-in-out; }
        @keyframes pulse-glow-amber {
            0%, 100% { box-shadow: 0 0 5px rgba(245, 158, 11, 0.2); }
            50% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
        }
        .pending-glow { animation: pulse-glow-amber 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-950 flex justify-center items-center min-h-screen font-sans text-slate-100 antialiased p-0 sm:p-4">

    <div class="iphone-13-frame flex flex-col">
        <!-- 頂部標頭 -->
        <div class="bg-slate-900/90 border-b border-slate-800 text-slate-200 py-5 px-6 text-center font-bold tracking-wider shadow-sm flex flex-col items-center justify-center shrink-0 space-y-2.5">
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 rounded-full bg-emerald-500 animate-ping"></div>
                <span class="font-black text-slate-100 tracking-widest text-2xl sm:text-3xl">永青營造 停車管理</span>
            </div>
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center space-x-2">
                    <span id="role-badge" class="text-xs bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 px-3 py-1 rounded-full font-bold">停車場管理員</span>
                    <button id="logout-btn" onclick="logout()" class="hidden text-xs bg-rose-500/20 text-rose-300 border border-rose-500/30 px-2 py-1 rounded-full font-bold">登出</button>
                </div>
                <button id="vip-list-btn" onclick="openVipListModal()" class="text-xs bg-amber-500/20 hover:bg-amber-500/30 text-amber-300 border border-amber-500/40 px-3 py-1 rounded-full font-bold flex items-center space-x-1 transition-all active:scale-95">
                    <span>👑 高階長官</span>
                </button>
            </div>
        </div>

        <!-- 主內容區 -->
        <div class="flex-1 overflow-y-auto p-4 no-scrollbar flex flex-col justify-between space-y-4">
            <div id="app-body" class="space-y-4">

                <!-- 雲端更新通知 Banner -->
                <div id="update-db-banner" class="hidden bg-amber-500/20 border border-amber-500/40 p-3 rounded-2xl flex items-center justify-between text-xs text-amber-200 pending-glow mb-2">
                    <span class="font-bold flex items-center">
                        <span class="mr-1.5 animate-bounce">🆕</span> 雲端車牌資料庫已有更新！
                    </span>
                    <button onclick="manualSync()" class="bg-amber-600 hover:bg-amber-500 text-white px-3 py-1.5 rounded-lg font-black active:scale-95 transition-all shadow-md">
                        🔄 更新車牌資料庫
                    </button>
                </div>

                <!-- ====== 警衛介面 ====== -->
                <div id="search-section" class="space-y-4">
                    <!-- 車牌搜尋框 -->
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="👉 請輸入車牌最後 3 碼或 4 碼 👈" class="w-full px-4 py-8 bg-slate-900/80 border-2 border-emerald-500/50 rounded-2xl focus:outline-none focus:border-emerald-400 font-mono text-3xl text-center font-black tracking-widest uppercase text-white placeholder-slate-400 shadow-2xl transition-all duration-200 focus:ring-4 focus:ring-emerald-500/20">
                    </div>

                    <!-- 比對結果動態顯示 -->
                    <div id="result-container" class="space-y-3 min-h-[150px]">
                        <p class="text-center text-slate-200 text-[18px] py-8 font-semibold">請輸入車牌號碼進行比對</p>
                    </div>

                    <!-- 警衛提交新車牌申請 -->
                    <div class="bg-sky-950/40 border border-sky-900/60 p-4 rounded-2xl shadow-lg space-y-3">
                        <h3 class="text-[18px] font-extrabold text-sky-300 tracking-wider flex items-center">
                            <span class="mr-1.5">🚗</span> 提交新車牌申請
                        </h3>
                        <p class="text-sky-300 font-bold text-center tracking-wider leading-snug py-1 text-[18px]">輸入新車牌後提交，待管理者核可即可放行</p>
                        <div class="space-y-2.5 text-[18px]">
                            <input type="text" id="guard-plate" placeholder="輸入車牌 (例: ABC-1234)" class="w-full p-3 bg-slate-900/60 border border-sky-900/40 rounded-xl text-white placeholder-sky-300/80 focus:outline-none focus:border-sky-500 font-mono text-[18px] tracking-wider uppercase">
                            <div class="relative">
                                <input type="text" id="guard-unit" placeholder="單位別 / 駕駛人姓名" class="w-full p-3 bg-slate-900/60 border border-sky-900/40 rounded-xl text-white placeholder-sky-300/80 focus:outline-none focus:border-sky-500 text-[18px]" autocomplete="off">
                                <div id="guard-unit-dropdown" class="absolute left-0 right-0 mt-1 max-h-[180px] overflow-y-auto bg-slate-900/95 border border-sky-900/60 rounded-xl shadow-2xl z-40 hidden custom-scrollbar divide-y divide-slate-800/60"></div>
                            </div>
                            <input type="text" id="guard-phone" placeholder="電話號碼" class="w-full p-3 bg-slate-900/60 border border-sky-900/40 rounded-xl text-white placeholder-sky-300/80 focus:outline-none focus:border-sky-500 text-[18px]">
                            <button onclick="guardSubmitPlate()" class="w-full bg-sky-600 hover:bg-sky-500 text-white py-3 rounded-xl font-bold active:scale-95 transition-all text-[18px]">📤 提交申請（待管理者核可）</button>
                        </div>
                        <div id="guard-pending-list" class="space-y-2 mt-2"></div>
                    </div>
                </div>

                <!-- ====== 管理者後台 ====== -->
                <div id="admin-section" class="hidden space-y-4">
                    <!-- GitHub 自動同步 -->
                    <div class="glass-panel p-4 rounded-2xl shadow-lg space-y-3">
                        <label class="block text-xs font-semibold text-slate-400 tracking-wider">🔄 GitHub 自動同步 (每 30 秒)</label>
                        <div class="space-y-2 text-xs">
                            <div id="sync-status" class="flex items-center justify-between p-2.5 bg-slate-900/60 border border-slate-700 rounded-xl">
                                <span class="text-slate-500">尚未啟動同步</span>
                            </div>
                            <button onclick="manualSync()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2.5 rounded-xl font-bold active:scale-95 transition-all mb-1">🔄 立即同步 GitHub 資料</button>
                            
                            <!-- 新增 下載 Excel 資料 與 上傳 Excel 資料 按鈕 -->
                            <div class="grid grid-cols-2 gap-2 pt-1.5 border-t border-slate-700/40">
                                <button onclick="downloadRawExcelFromGithub()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 py-2 rounded-xl font-bold active:scale-95 transition-all text-[11px] flex items-center justify-center space-x-1">
                                    <span>📥 下載 Excel 資料</span>
                                </button>
                                <label class="bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl font-bold active:scale-95 transition-all cursor-pointer text-[11px] flex items-center justify-center space-x-1">
                                    <span>📤 上傳 Excel 資料</span>
                                    <input type="file" id="excel-file" accept=".xlsx,.xls" class="hidden" onchange="loadExcelFile(this)">
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 今日待核可車牌 -->
                    <div class="bg-amber-950/40 border border-amber-900/60 p-4 rounded-2xl shadow-lg space-y-3">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-extrabold text-amber-300 tracking-wider flex items-center">
                                <span class="mr-1.5">🔔</span> 今日待核可 (<span id="pending-count">0</span>)
                            </h3>
                            <button onclick="clearExpiredPending()" class="text-[10px] text-slate-500 hover:text-slate-300 transition-all">清除過期</button>
                        </div>
                        <div id="pending-list" class="space-y-2.5 max-h-[200px] overflow-y-auto pr-1 text-xs no-scrollbar">
                            <p class="text-center text-amber-500/60 text-[11px] py-2">目前無待核可車牌</p>
                        </div>
                    </div>

                    <!-- 管理者直接新增車牌 -->
                    <div class="bg-amber-950/40 border border-amber-900/60 p-4 rounded-2xl shadow-lg space-y-3">
                        <h3 class="text-sm font-extrabold text-amber-300 tracking-wider flex items-center">
                            <span class="mr-1.5">🎟️</span> 管理者直接核發
                        </h3>
                        <div class="space-y-2.5 text-xs">
                            <input type="text" id="temp-plate" placeholder="輸入車牌 (例: ABC-1234)" class="w-full p-3 bg-slate-900/60 border border-amber-900/40 rounded-xl text-amber-100 placeholder-amber-700/60 focus:outline-none focus:border-amber-500 font-mono text-sm tracking-wider uppercase">
                            <div class="relative">
                                <input type="text" id="temp-unit" placeholder="單位別 / 姓名" class="w-full p-3 bg-slate-900/60 border border-amber-900/40 rounded-xl text-amber-100 placeholder-amber-700/60 focus:outline-none focus:border-amber-500 text-sm" autocomplete="off">
                                <div id="temp-unit-dropdown" class="absolute left-0 right-0 mt-1 max-h-[150px] overflow-y-auto bg-slate-900/95 border border-amber-900/60 rounded-xl shadow-2xl z-40 hidden custom-scrollbar divide-y divide-slate-800/60"></div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 pt-1">
                                <button onclick="adminAddLicense('臨時(當日)')" class="bg-amber-600 hover:bg-amber-500 text-white py-2.5 rounded-xl font-bold active:scale-95 transition-all text-xs">當日</button>
                                <button onclick="adminAddLicense('臨時(當周)')" class="bg-amber-700 hover:bg-amber-600 text-white py-2.5 rounded-xl font-bold active:scale-95 transition-all text-xs">當周</button>
                                <button onclick="adminAddLicense('常駐車輛')" class="bg-emerald-700 hover:bg-emerald-600 text-white py-2.5 rounded-xl font-bold active:scale-95 transition-all text-xs">常駐</button>
                            </div>
                        </div>
                    </div>

                    <!-- 資料庫確認後台 -->
                    <div class="glass-panel p-4 rounded-2xl shadow-lg space-y-3">
                        <div class="flex justify-between items-center mb-1">
                            <h3 class="text-sm font-extrabold text-slate-300 tracking-wider">📂 資料後台 (<span id="db-count">0</span>)</h3>
                            <div class="flex space-x-1.5">
                                <button onclick="openLogViewer()" class="text-xs bg-slate-600 hover:bg-slate-500 text-white px-3 py-1.5 rounded-lg font-bold transition-all">📋 紀錄</button>
                                <button onclick="downloadExcel()" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg font-bold transition-all">📥 匯出</button>
                            </div>
                        </div>
                        <div id="database-list" class="space-y-2.5 max-h-[300px] overflow-y-auto pr-1 text-xs no-scrollbar"></div>
                    </div>
                </div>
            </div>

            <!-- 底部切換與版本區 -->
            <div class="pt-4 shrink-0 space-y-2">
                <div class="flex justify-between items-center text-[11px] text-slate-300 px-1 select-none font-bold">
                    <div class="flex items-center space-x-1.5 text-[12px] text-white font-bold">
                        <span id="version-status-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span id="db-version-text" class="font-mono">Ver 2026/--/--/--:--</span>
                    </div>
                    <span class="text-slate-200">永青三總專用</span>
                </div>
                <button id="toggle-role-btn" onclick="toggleRole()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm py-3.5 rounded-2xl font-bold tracking-wider shadow-lg border border-slate-700 active:scale-98 transition-all duration-200">
                    切換至【管理者登入】
                </button>
            </div>
        </div>
    </div>

    <!-- 登入 Modal -->
    <div id="login-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden justify-center items-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-2xl p-6 space-y-4 shadow-2xl">
            <h3 class="text-lg font-extrabold text-white text-center">管理者權限驗證</h3>
            <div class="space-y-3">
                <select id="login-user" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white text-sm focus:outline-none focus:border-emerald-500">
                    <option value="admin">系統管理員 (admin)</option>
                    <option value="admin1">管理者 1 (admin1)</option>
                    <option value="admin2">管理者 2 (admin2)</option>
                    <option value="admin3">管理者 3 (admin3)</option>
                </select>
                <input type="password" id="login-pass" placeholder="請輸入密碼 (預設: 1189)" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white text-sm focus:outline-none focus:border-emerald-500 text-center tracking-widest">
                <div id="login-error" class="hidden text-center text-rose-400 text-xs font-bold p-2 bg-rose-950/40 border border-rose-900/40 rounded-xl"></div>
            </div>
            <div class="flex space-x-2 pt-2">
                <button onclick="closeLoginModal()" class="w-1/2 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-bold text-sm">取消</button>
                <button onclick="submitLogin()" class="w-1/2 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-bold text-sm">驗證登入</button>
            </div>
        </div>
    </div>

    <!-- 高階長官車牌列表 Modal -->
    <div id="vip-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden justify-center items-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-2xl p-6 space-y-4 shadow-2xl flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center pb-2 border-b border-slate-800">
                <h3 class="text-lg font-black text-amber-400 tracking-wider flex items-center">
                    <span>👑 高階長官車牌名冊</span>
                </h3>
                <button onclick="closeVipListModal()" class="text-slate-400 hover:text-white font-bold text-lg px-2">✕</button>
            </div>
            
            <p class="text-[12px] text-rose-300 bg-rose-950/40 border border-rose-900/40 p-2.5 rounded-xl font-bold leading-relaxed">
                ⚠️ 重要須知：第一天上班的管理員（警衛）必須熟記以下長官車牌，遇長官座車請主動放行並敬禮！
            </p>

            <div class="flex-1 overflow-y-auto space-y-3 pr-1 no-scrollbar text-xs">
                <!-- 1. 核心必記長官 -->
                <div class="space-y-2">
                    <p class="text-slate-400 font-extrabold tracking-wider border-l-2 border-amber-500 pl-2">📌 核心必記長官座車</p>
                    <div class="space-y-2" id="vip-static-list">
                        <!-- 靜態長官 -->
                    </div>
                </div>

                <!-- 2. 資料庫動態載入的長官車輛 -->
                <div class="space-y-2 pt-2">
                    <p class="text-slate-400 font-extrabold tracking-wider border-l-2 border-indigo-500 pl-2">🚗 系統內已登記長官座車 (<span id="vip-db-count">0</span>)</p>
                    <div class="space-y-2" id="vip-dynamic-list">
                        <!-- 動態長官 -->
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button onclick="closeVipListModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-bold text-sm transition-all active:scale-95">關閉名冊</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  全域狀態
        // ============================================================
        let githubDatabase = [];        // GitHub 同步的資料 (唯讀鏡像)
        let localAdditions = [];        // 本地新增的車牌 (不被同步覆蓋)
        let localChecks = {};           // 本地核簽變更 { "車牌": {"管理者1":"OK",...} }
        let pendingPlates = [];         // 警衛提交的待核可車牌
        let currentRole = "guard";
        let syncIntervalId = null;
        let countdownId = null;
        let nextSyncSeconds = 30;
        let guardSyncId = null;
        let kickCheckId = null;         // 被踢偵測計時器
        let checkUpdateIntervalId = null; // 檢查雲端更新計時器 ID

        // 本分頁唯一識別碼 (用於判斷是否被其他分頁踢出)
        const SESSION_ID = Date.now() + "_" + Math.random().toString(36).substr(2, 8);
        const PROTECT_MS = 10000; // 10 秒保護期

        // GitHub 公開 Repo
        const GITHUB_REPO = "ericlai429/Parking-Pass";
        const GITHUB_BRANCH = "master";
        const GITHUB_FILE = "永青三總停車清單.xlsx";
        const GITHUB_RAW_URL = `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${encodeURIComponent(GITHUB_FILE)}`;

        // ============================================================
        //  合併資料庫 (GitHub + 本地新增 + 本地核簽)
        //  → 解決漏洞 1, 2, 3：同步不會覆蓋本地變更
        // ============================================================
        function getMergedDatabase() {
            // 1. 從 GitHub 資料套用本地核簽
            const merged = githubDatabase.map(item => {
                const plate = (item["車牌"] || "").toUpperCase().trim();
                const checks = localChecks[plate];
                if (checks) {
                    return { ...item, ...checks };
                }
                return { ...item };
            });

            // 2. 加入本地新增 (排除已存在於 GitHub 的重複車牌)
            localAdditions.forEach(item => {
                const plate = (item["車牌"] || "").toUpperCase().trim();
                const existsInGithub = githubDatabase.some(g =>
                    (g["車牌"] || "").toUpperCase().trim() === plate
                );
                if (!existsInGithub) {
                    merged.unshift(item); // 新增的放最前面
                }
            });

            return merged;
        }

        // ============================================================
        //  初始化
        // ============================================================
        window.onload = function() {
            logout();

            // 載入快取
            const ghCache = localStorage.getItem("github_db");
            if (ghCache) githubDatabase = JSON.parse(ghCache);

            const laCache = localStorage.getItem("local_additions");
            if (laCache) localAdditions = JSON.parse(laCache);

            const lcCache = localStorage.getItem("local_checks");
            if (lcCache) localChecks = JSON.parse(lcCache);

            loadPendingPlates();
            renderAll();

            // 搜尋框自動大寫
            ["search-input", "guard-plate", "temp-plate", "guard-phone"].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener("input", function(e) {
                    e.target.value = e.target.value.toUpperCase();
                    if (id === "search-input") renderResults(e.target.value.trim());
                });
            });

            startGuardAutoSync();

            // 初始化版本與燈號顯示 (優先讀取快取)
            updateVersionUI(false);

            // 每 10 秒檢查一次雲端資料庫是否有新變更
            checkGitHubMtime();
            checkUpdateIntervalId = setInterval(checkGitHubMtime, 10000);

            // 綁定智能下拉選單
            setupSmartDropdown("guard-unit", "guard-unit-dropdown");
            setupSmartDropdown("temp-unit", "temp-unit-dropdown");
        };

        function renderAll() {
            renderAdminDatabase();
            updateSuggestions();
            renderGuardPendingList();
            renderAdminPendingList();
            const si = document.getElementById("search-input");
            renderResults(si ? si.value.trim() : "");
        }

        // ============================================================
        //  Admin 單一登入管理 (互踢 + 10 秒保護)
        // ============================================================
        function getActiveSession() {
            const raw = localStorage.getItem("admin_session");
            return raw ? JSON.parse(raw) : null;
        }

        function setActiveSession(user) {
            localStorage.setItem("admin_session", JSON.stringify({
                user: user,
                sessionId: SESSION_ID,
                loginTime: Date.now()
            }));
        }

        function clearActiveSession() {
            const session = getActiveSession();
            // 只清除自己的 session

        //  待核可車牌管理 (localStorage)

        function getTodayKey() {

        }

        function loadPendingPlates() {
            const raw = localStorage.getItem("pending_plates");
            pendingPlates = raw ? JSON.parse(raw) : [];
            const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
            pendingPlates = pendingPlates.filter(p => p.timestamp > sevenDaysAgo);
            savePendingPlates();
        }

        function savePendingPlates() {
            localStorage.setItem("pending_plates", JSON.stringify(pendingPlates));
        }

        function guardSubmitPlate() {
            const plate = document.getElementById("guard-plate").value.trim().toUpperCase();
            const unit = document.getElementById("guard-unit").value.trim();
            const phone = document.getElementById("guard-phone").value.trim();
            if (!plate) { alert("請輸入車牌號碼"); return; }

            const norm = normalizePlate(plate);
            const merged = getMergedDatabase();

            if (merged.some(i => normalizePlate(i["車牌"]) === norm)) {
                alert("此車牌已在核可清單中！"); return;
            }
            if (pendingPlates.some(p => normalizePlate(p.plate) === norm && p.status === "pending")) {
                alert("此車牌已提交申請，等待核可中！"); return;
            }

            pendingPlates.unshift({
                plate, unit: unit || "未填寫", phone: phone || "-", status: "pending",
                date: getTodayKey(), timestamp: Date.now(), approvedBy: ""
            });
            savePendingPlates();
            logAction("提交申請", "guard", `警衛提交新車牌申請: ${plate}，單位: ${unit || '未填寫'}，電話: ${phone || '-'}`, plate);
            renderGuardPendingList();
            renderAdminPendingList();
            alert(`車牌 ${plate} 已提交！等待管理者核可...`);

            document.getElementById("guard-unit").value = "";
            document.getElementById("guard-phone").value = "";

        // ============================================================
        //  GitHub 自動同步 (只更新 githubDatabase，不覆蓋本地)
        // ============================================================
        async function syncFromGithub(silent = false) {
            try {
                updateSyncStatus("同步中...", "text-amber-400");
                const response = await fetch(`${GITHUB_RAW_URL}?t=${Date.now()}`, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
                const sheet = getBestSheet(workbook);
                const jsonData = XLSX.utils.sheet_to_json(sheet);

                const parsed = parseExcelJson(jsonData);

                // 防空檔覆蓋保護機制：如果從 GitHub 同步下來的資料是空的，且本地已有手動匯入的資料，我們不進行覆寫
                if (parsed.length === 0 && githubDatabase.length > 0) {
                    const now = new Date().toLocaleString("zh-TW");
                    const total = getMergedDatabase().length;
                    updateSyncStatus(`✅ ${total} 筆 (雲端空檔，保留本地)`, "text-emerald-400");
                    cleanupLocalAdditions();
                    renderAll();
                    return;
                }

                githubDatabase = parsed;

                localStorage.setItem("github_db", JSON.stringify(githubDatabase));
                const now = new Date().toLocaleString("zh-TW");
                localStorage.setItem("parking_db_time", now);
                localStorage.setItem("parking_db_iso", new Date().toISOString());

                // 同步時順便抓取並更新該檔案在 GitHub 上的最新 ETag 與 Mtime，以此為基準
                try {
                    const headResp = await fetch(`${GITHUB_RAW_URL}?t=${Date.now()}`, { method: 'HEAD', cache: 'no-store' });
                    if (headResp.ok) {
                        const mtime = headResp.headers.get('Last-Modified');
                        const etag = headResp.headers.get('ETag');
                        if (mtime) localStorage.setItem("github_file_mtime", mtime);
                        if (etag) localStorage.setItem("github_file_etag", etag);
                    }
                } catch(e) {}
                showUpdateBanner(false); // 隱藏雲端更新通知 Banner
                updateVersionUI(false);  // 更新版本號為最新 (綠燈)

                // 清理已被 GitHub 收錄的本地新增 (避免重複)
                cleanupLocalAdditions();

                renderAll();

                const total = getMergedDatabase().length;
                updateSyncStatus(`✅ ${total} 筆 | ${now}`, "text-emerald-400");
            } catch (err) {
                updateSyncStatus(`❌ ${err.message}`, "text-rose-400");
                if (!silent) console.error("同步失敗:", err);
            }
        }

        // 清理已被 GitHub 收錄的本地新增
        function cleanupLocalAdditions() {
            const before = localAdditions.length;
            localAdditions = localAdditions.filter(la => {
                const plate = (la["車牌"] || "").toUpperCase().trim();
                return !githubDatabase.some(g =>
                    (g["車牌"] || "").toUpperCase().trim() === plate
                );
            });
            if (localAdditions.length !== before) saveLocalAdditions();
        }

        // ============================================================
        //  GitHub Mtime/ETag 輕量化檢測 (每 10 秒)
        // ============================================================
        async function checkGitHubMtime() {
            try {
                const response = await fetch(`${GITHUB_RAW_URL}?t=${Date.now()}`, { method: 'HEAD', cache: 'no-store' });
                if (!response.ok) return;

                const currentMtime = response.headers.get('Last-Modified');
                const currentEtag = response.headers.get('ETag');

                const savedMtime = localStorage.getItem("github_file_mtime");
                const savedEtag = localStorage.getItem("github_file_etag");

                // 如果本地還沒有任何紀錄，直接更新為基準
                if (!savedMtime && !savedEtag) {
                    if (currentMtime) localStorage.setItem("github_file_mtime", currentMtime);
                    if (currentEtag) localStorage.setItem("github_file_etag", currentEtag);
                    showUpdateBanner(false);
                    updateVersionUI(false);
                    return;
                }
                const mtimeChanged = currentMtime && savedMtime && savedMtime !== currentMtime;
                const etagChanged = currentEtag && savedEtag && savedEtag !== currentEtag;

                if (mtimeChanged || etagChanged) {
                    showUpdateBanner(true);
                    updateVersionUI(true); // 有新資料：黃燈
                } else {
                    showUpdateBanner(false);
                    updateVersionUI(false); // 無新資料：綠燈
                }
            } catch (err) {
                console.warn("檢查 GitHub 更新時間失敗:", err);
            }
        }

        function showUpdateBanner(show) {
            const banner = document.getElementById("update-db-banner");
            if (!banner) return;
            if (show) {
                banner.classList.remove("hidden");
                banner.classList.add("flex");
            } else {
                banner.classList.add("hidden");
                banner.classList.remove("flex");
            }
        }

        // ============================================================
        //  車牌標準化與全形轉半形工具
        // ============================================================
        function toHalfWidth(str) {
            if (!str) return "";
            return str.replace(/[\uFF01-\uFF5E]/g, function(ch) {
                return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
            }).replace(/\u3000/g, " ");
        }

        function normalizePlate(plate) {
            if (!plate) return "";
            let p = toHalfWidth(String(plate).toUpperCase().trim());
            p = p.replace(/[－一—]/g, "-");
            p = p.replace(/[^A-Z0-9-]/g, "");
            return p;
        }

        // 尋找第一個含有車牌資料或資料量最多的非空工作表
        function getBestSheet(wb) {
            let bestSheet = wb.Sheets[wb.SheetNames[0]];
            let maxRows = 0;
            
            for (let name of wb.SheetNames) {
                const sheet = wb.Sheets[name];
                if (!sheet || !sheet['!ref']) continue;
                
                const json = XLSX.utils.sheet_to_json(sheet);
                if (json.length > 0) {
                    const hasPlateHeader = json.some(row => Object.keys(row).some(k => k.includes("車牌") || k.includes("車號") || k.toLowerCase().includes("plate")));
                    if (hasPlateHeader) {
                        return sheet;
                    }
                    if (json.length > maxRows) {
                        maxRows = json.length;
                        bestSheet = sheet;
                    }
                }
            }
            return bestSheet;
        }

        // 智慧欄位名稱模糊匹配與解析
        function parseExcelJson(json) {
            const getValByFuzzyKeys = (row, possibleKeys) => {
                for (let key of Object.keys(row)) {
                    const cleanKey = key.trim().toLowerCase();
                    if (possibleKeys.some(pk => cleanKey.includes(pk.toLowerCase()) || pk.toLowerCase().includes(cleanKey))) {
                        return row[key];
                    }
                }
                return "";
            };

            return json.map(r => {
                const plateVal = getValByFuzzyKeys(r, ["車牌", "車號", "plate"]);
                const unitVal = getValByFuzzyKeys(r, ["單位", "單位別", "科室", "unit"]);
                const nameVal = getValByFuzzyKeys(r, ["姓名", "駕駛", "owner", "name"]);
                const phoneVal = getValByFuzzyKeys(r, ["電話", "手機", "聯絡", "phone"]);
                const noteVal = getValByFuzzyKeys(r, ["備註", "備註事項", "remark", "note"]);
                const typeVal = getValByFuzzyKeys(r, ["類型", "車輛類型", "type"]);

                return {
                    "單位別": String(unitVal || "").trim(),
                    "分項": String(r["分項"] || r["分項登記"] || "").trim(),
                    "車牌": String(plateVal || "").trim().toUpperCase(),
                    "電話": String(phoneVal || "").trim(),
                    "姓名": String(nameVal || "").trim(),
                    "備註": String(noteVal || "").trim(),
                    "管理者1": String(r["管理者1"] || "").trim(),
                    "管理者2": String(r["管理者2"] || "").trim(),
                    "管理者3": String(r["管理者3"] || "").trim(),
                    "類型": String(typeVal || "regular").trim()
                };
            }).filter(item => item["車牌"].length > 0);
        }

        // ============================================================
        //  版本號與狀態燈更新 UI 邏輯
        // ============================================================
        function formatMtimeToVersion(mtimeStr) {
            let targetDate = null;
            if (mtimeStr) {
                const d = new Date(mtimeStr);
                if (!isNaN(d.getTime())) {
                    targetDate = d;
                }
            }
            if (!targetDate) {
                const localDbIso = localStorage.getItem("parking_db_iso");
                if (localDbIso) {
                    const d = new Date(localDbIso);
                    if (!isNaN(d.getTime())) {
                        targetDate = d;
                    }
                }
            }
            if (!targetDate) {
                targetDate = new Date();
            }
            try {
                const y = targetDate.getFullYear();
                const m = String(targetDate.getMonth() + 1).padStart(2, '0');
                const r = String(targetDate.getDate()).padStart(2, '0');
                const h = String(targetDate.getHours()).padStart(2, '0');
                const min = String(targetDate.getMinutes()).padStart(2, '0');
                return `Ver ${y}/${m}/${r}/${h}:${min}`;
            } catch(e) {
                return "Ver 2026/--/--/--:--";
            }
        }

        function updateVersionUI(hasNewData) {
            const dot = document.getElementById("version-status-dot");
            const text = document.getElementById("db-version-text");
            if (!dot || !text) return;

            const localMtime = localStorage.getItem("github_file_mtime");
            text.innerText = formatMtimeToVersion(localMtime);

            if (hasNewData) {
                // 有新資料：黃燈亮起，呈現呼吸/閃爍狀態
                dot.className = "w-2.5 h-2.5 rounded-full bg-amber-500 animate-ping";
            } else {
                // 最新版：綠燈常亮，呈現穩定的脈動/呼吸狀態
                dot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse";
            }
        }

        function stopAutoSync() {
            if (syncIntervalId) { clearInterval(syncIntervalId); syncIntervalId = null; }
            if (countdownId) { clearInterval(countdownId); countdownId = null; }

        function updateSyncStatus(text, cls) {

        function updateSyncCountdown() {

        }

        // ============================================================
        //  車牌搜尋 (警衛介面)
        // ============================================================
        function renderResults(keyword) {
            const container = document.getElementById("result-container");
            container.innerHTML = "";
            const allData = getMergedDatabase();

            if (allData.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-200 text-[18px] py-8 font-semibold">請先載入車牌資料</p>';
                return;
            }
            if (!keyword) {
                container.innerHTML = '<p class="text-center text-slate-200 text-[18px] py-8 font-semibold">等待輸入車牌...</p>';
                return;
            }

            let nk = normalizePlate(keyword);
            if (nk.replace(/-/g, "").length < 3) {
                container.innerHTML = '<p class="text-center text-amber-400 text-[18px] py-8 font-extrabold">⚠️ 請至少輸入 3 碼</p>';
                return;
            }

            const filtered = allData.filter(i => {
                const cp = normalizePlate(i["車牌"]);
                return cp.includes(nk);
            });

            const pendingMatches = pendingPlates.filter(p => {
                if (p.status !== "pending") return false;
                const cp = normalizePlate(p.plate);
                return cp.includes(nk);
            });

            if (filtered.length === 0 && pendingMatches.length === 0) {
                container.innerHTML = `<div class="bg-rose-950/40 border border-rose-900/60 text-rose-200 p-5 rounded-2xl text-center fail-glow">
                    <p class="font-black text-2xl tracking-wider text-rose-400">⚠️ 未註冊車牌</p>
                    <p class="text-[18px] mt-2 text-rose-300/80">請勿放行，或由下方提交申請</p></div>`;
                return;
            }

            filtered.forEach(item => {
                const ap = [];
                if (item["管理者1"]==="OK") ap.push("主管1");
                if (item["管理者2"]==="OK") ap.push("主管2");
                if (item["管理者3"]==="OK") ap.push("主管3");
                const apText = ap.length > 0 ? `已確認 (${ap.join(', ')})` : "待確認";
                
                // 計算通行證期限
                let expiryText = "永久通過";
                let expiryClass = "text-slate-200 font-bold";
                
                // 檢查是否為高階長官 (靜態清單或動態欄位關鍵字)
                const plateNorm = normalizePlate(item["車牌"]);
                const isStaticVip = VIP_STATIC_LIST.some(sv => normalizePlate(sv.plate) === plateNorm);
                
                const keywords = ["長官", "院長", "局長", "總監", "董事", "總經理", "經理", "處長", "主任"];
                const remark = (item["備註"] || "").toUpperCase();

        function showLoginError(msg) {
            const el = document.getElementById("login-error");

            el.classList.remove("hidden");
        }

        function submitLogin() {
            const user = document.getElementById("login-user").value;
            const pass = document.getElementById("login-pass").value;

            if (pass !== "1189") {
                showLoginError("❌ 驗證密碼錯誤！");
                document.getElementById("login-pass").value = "";
                return;
            }

            // 檢查是否有其他管理者正在登入
            const session = getActiveSession();
            if (session && session.sessionId !== SESSION_ID) {
                const elapsed = Date.now() - session.loginTime;

                // 10 秒保護期內，不允許踢人
                if (elapsed < PROTECT_MS) {
                    const remaining = Math.ceil((PROTECT_MS - elapsed) / 1000);
                    showLoginError(`⚠️ ${session.user} 於 ${remaining} 秒前登入（保護期內），請稍後再試。`);
                    document.getElementById("login-pass").value = "";
                    return;
                }

                // 超過保護期，踢出舊管理者
                // (舊管理者的 kickCheck 會偵測到 session 變更並自動登出)
            }

            // 登入成功
            currentRole = user;
            setActiveSession(user);

            const badge = document.getElementById("role-badge");
            badge.innerText = `主任: ${user}`;
            badge.className = "text-xs bg-amber-500/20 text-amber-300 border border-amber-500/30 px-3 py-1 rounded-full font-bold";

            document.getElementById("logout-btn").classList.remove("hidden");
            document.getElementById("toggle-role-btn").innerText = "切換至【停車場管理員介面】";
            document.getElementById("search-section").classList.add("hidden");
            document.getElementById("admin-section").classList.remove("hidden");

            closeLoginModal();
            renderAll();
            startAdminAutoSync();
            startKickCheck();

            document.getElementById("login-pass").value = "";

            logAction("登入", user, `${user} 管理者登入系統`, "");

            // 提示是否踢出了其他人
            if (session && session.sessionId !== SESSION_ID) {
                logAction("踢出", user, `${user} 踢出 ${session.user} 的登入連線`, "");
                alert(`已由 ${user} 接管登入。\n原先 ${session.user} 的連線已被踢出。`);
            }
        }

            clearActiveSession();
            currentRole = "guard";

        function setupSmartDropdown(inputId, dropdownId) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            if (!input || !dropdown) return;

            // 取得所有資料庫中的唯一非空單位名稱
            function getUnits() {
                const merged = getMergedDatabase();
                return [...new Set(merged.map(i => (i["單位別"]||"").trim()).filter(u => u.length > 0))];
            }

            // 渲染下拉內容
            function renderDropdown(filterText = "") {
                const units = getUnits();
                const matched = units.filter(u => u.toUpperCase().includes(filterText.toUpperCase()));
                
                if (matched.length === 0) {
                    dropdown.innerHTML = `<div class="p-3 text-slate-500 text-xs text-center">查無匹配單位</div>`;
                    return;
                }

                // 產生選項，樣式仿照 777 開獎滾輪/高品質滑動選單
                dropdown.innerHTML = matched.map(u => `
                    <div class="dropdown-item px-4 py-3 text-slate-200 hover:text-white hover:bg-emerald-500/20 active:bg-emerald-500/40 cursor-pointer font-bold transition-all flex items-center space-x-2 select-none" style="font-size: 16px;">
                        <span>🏢</span>
                        <span>${u}</span>
                    </div>
                `).join("");

                // 綁定點擊事件
                Array.from(dropdown.children).forEach((el, index) => {
                    if (el.classList.contains("dropdown-item")) {
                        el.addEventListener("mousedown", (e) => {
                            e.preventDefault(); // 防止 input 失去焦點
                            input.value = matched[index];
                            hideDropdown();
                        });
                    }
                });
            }

            function showDropdown() {
                renderDropdown(input.value.trim());
                dropdown.classList.remove("hidden");
                dropdown.classList.add("block");
            }

            function hideDropdown() {
                dropdown.classList.add("hidden");
                dropdown.classList.remove("block");
            }

            // 監聽事件
            input.addEventListener("focus", showDropdown);
            input.addEventListener("blur", () => {
                // 延遲關閉，讓 mousedown 事件能夠順利觸發
                setTimeout(hideDropdown, 200);
            });
            input.addEventListener("input", (e) => {
                renderDropdown(e.target.value.trim());
            });
        }

        function updateField(index, field, value) {
            const merged = getMergedDatabase();
            const item = merged[index];
            if (!item) return;

            const plate = (item["車牌"] || "").toUpperCase().trim();
            const oldValue = item[field] || "";

            // 判斷是 GitHub 資料還是本地新增
            const ghIdx = githubDatabase.findIndex(g => (g["車牌"]||"").toUpperCase().trim() === plate);
            if (ghIdx >= 0) {
                // GitHub 資料 → 存入 localChecks
                if (!localChecks[plate]) localChecks[plate] = {};
                localChecks[plate][field] = value;
                saveLocalChecks();
            } else {
                // 本地新增 → 直接修改
                const laIdx = localAdditions.findIndex(l => (l["車牌"]||"").toUpperCase().trim() === plate);
                if (laIdx >= 0) {
                    localAdditions[laIdx][field] = value;
                    saveLocalAdditions();
                }
            }
            logAction("修改欄位", currentRole, `修改車牌 ${plate} 的 ${field} 欄位：「${oldValue}」→「${value}」`, plate);
            renderAdminDatabase();
        }

            const merged = getMergedDatabase();

            const plate = (item["車牌"] || "").toUpperCase().trim();
            const newVal = item[adminCol] === "OK" ? "" : "OK";
            const actionText = newVal === "OK" ? "勾選核簽" : "取消核簽";

            const ghIdx = githubDatabase.findIndex(g => (g["車牌"]||"").toUpperCase().trim() === plate);
            if (ghIdx >= 0) {
                if (!localChecks[plate]) localChecks[plate] = {};
                localChecks[plate][adminCol] = newVal;
                saveLocalChecks();
            } else {
                const laIdx = localAdditions.findIndex(l => (l["車牌"]||"").toUpperCase().trim() === plate);
                if (laIdx >= 0) {

                }
            }
            logAction(actionText, currentRole, `${currentRole} 將車牌 ${plate} 的核簽改為 ${newVal || '無'}`, plate);
            renderAdminDatabase();
        }

        // ============================================================
        function loadExcelFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                    const ws = getBestSheet(wb);
                    const json = XLSX.utils.sheet_to_json(ws);
                    
                    const parsed = parseExcelJson(json);
                    if (parsed.length === 0) {
                        alert("⚠️ 匯入失敗！選擇的 Excel 中沒有任何有效車牌資料列，或是工作表為空。\n請確認工作表內是否有標頭欄位（例如欄位包含『車牌』或『車號』等名稱）！");
                        input.value = "";
                        return;
                    }

                    githubDatabase = parsed;
                    localStorage.setItem("github_db", JSON.stringify(githubDatabase));
                    localStorage.setItem("parking_db_time", new Date().toLocaleString("zh-TW"));
                    localStorage.setItem("parking_db_iso", new Date().toISOString());
                    cleanupLocalAdditions();
                    logAction("匯入Excel", currentRole, `手動匯入本機 Excel 檔案: ${file.name} (載入 ${githubDatabase.length} 筆資料)`, "");
                    alert(`成功匯入 ${githubDatabase.length} 筆資料！`);
                    renderAll();
                } catch (err) { alert("解析失敗: " + err.message); }
            };
            reader.readAsArrayBuffer(file);
            input.value = "";
        }

        // ============================================================
        function downloadExcel() {
            const merged = getMergedDatabase();
            if (merged.length === 0) { alert("沒有資料可匯出！"); return; }
            try {
                const exp = merged.map(i => ({
                    "單位別":i["單位別"], "分項":i["分項"], "車牌":i["車牌"],
                    "電話":i["電話"], "姓名":i["姓名"], "備註":i["備註"],
                    "管理者1":i["管理者1"], "管理者2":i["管理者2"],
                    "管理者3":i["管理者3"], "類型":i["類型"]
                }));
                const ws = XLSX.utils.json_to_sheet(exp);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "工作表1");
                XLSX.writeFile(wb, `永青停車清單_${new Date().toISOString().slice(0,10)}.xlsx`);
                logAction("匯出Excel", currentRole, `導出合併資料庫 Excel (${merged.length} 筆資料)`, "");
                alert("Excel 已下載！\n上傳至 GitHub 後，本地新增的資料將在下次同步時自動清理。");
            } catch (err) { alert("匯出失敗: " + err.message); }
        }

                    actionBadge = \`<span class="text-emerald-400 font-bold font-sans px-1.5 py-0.5 rounded bg-emerald-500/10 border border-emerald-500/20">\${log.actionType}</span>\`;
                } else if (log.actionType.includes("修改")) {
                    actionBadge = \`<span class="text-sky-400 font-bold font-sans px-1.5 py-0.5 rounded bg-sky-500/10 border border-sky-500/20">\${log.actionType}</span>\`;
                } else if (log.actionType.includes("駁回") || log.actionType.includes("踢出")) {
                    actionBadge = \`<span class="text-rose-400 font-bold font-sans px-1.5 py-0.5 rounded bg-rose-500/10 border border-rose-500/20">\${log.actionType}</span>\`;
                } else if (log.actionType.includes("勾選") || log.actionType.includes("簽")) {
                    actionBadge = \`<span class="text-indigo-400 font-bold font-sans px-1.5 py-0.5 rounded bg-indigo-500/10 border border-indigo-500/20">\${log.actionType}</span>\`;
                } else {
                    actionBadge = \`<span class="text-slate-400 px-1.5 py-0.5 rounded bg-slate-800 border border-slate-700">\${log.actionType}</span>\`;
                }

                // 操作人員標籤
                let userBadge = "";
                if (log.user === "guard") {
                    userBadge = \`<span class="text-slate-400 font-bold">警衛 (guard)</span>\`;
                } else {
                    userBadge = \`<span class="text-amber-400 font-bold">\${log.user}</span>\`;
                }

                tbody.innerHTML += \`
                    <tr class="hover:bg-slate-900/60 transition-colors">
                        <td class="p-3 text-slate-400">\${time}</td>
                        <td class="p-3">\${userBadge}</td>
                        <td class="p-3">\${actionBadge}</td>
                        <td class="p-3 font-bold tracking-wider text-white font-sans">\${log.plate || '-'}</td>
                        <td class="p-3 text-slate-300">\${log.detail}</td>
                    </tr>
                \`;
            });
        }

        function filterLogs() {
            const timeVal = document.getElementById("time-filter").value;
            const typeVal = document.getElementById("type-filter").value;
            const searchVal = document.getElementById("search-filter").value.trim().toUpperCase();

            let result = logs;

            // 1. 時間篩選
            const now = Date.now();
            const startOfToday = new Date().setHours(0,0,0,0);
            const startOfWeek = now - 7 * 24 * 60 * 60 * 1000;

            if (timeVal === "today") {
                result = result.filter(l => l.timestamp >= startOfToday);
            } else if (timeVal === "weekly") {
                result = result.filter(l => l.timestamp >= startOfWeek);
            }

            // 2. 行動篩選
            if (typeVal !== "all") {
                result = result.filter(l => l.actionType.includes(typeVal));
            }

            // 3. 關鍵字搜尋
            if (searchVal) {
                result = result.filter(l => {
                    const plateMatch = (l.plate || "").toUpperCase().includes(searchVal);
                    const userMatch = (l.user || "").toUpperCase().includes(searchVal);
                    const detailMatch = (l.detail || "").toUpperCase().includes(searchVal);
                    return plateMatch || userMatch || detailMatch;
                });
            }

            renderLogs(result);
        }

        function clearLogs() {
            if (confirm("⚠️ 確定要清除所有本地操作日誌嗎？這將無法復原！")) {
                localStorage.setItem("parking_logs", "[]");
                location.reload();
            }
        }

        // 頁面開啟時渲染全部
        renderLogs(logs);
    <\/script>
</body>
</html>
            `);
            logWindow.document.close();
        }

        // ============================================================
        //  渲染後台資料庫
        // ============================================================
        function renderAdminDatabase() {
            const list = document.getElementById("database-list");
            if (!list) return;
            const merged = getMergedDatabase();
            document.getElementById("db-count").innerText = merged.length;
            list.innerHTML = "";

            merged.forEach((item, index) => {
                const c1 = item["管理者1"]==="OK", c2 = item["管理者2"]==="OK", c3 = item["管理者3"]==="OK";
                const plate = (item["車牌"]||"").toUpperCase().trim();
                const isLocal = !githubDatabase.some(g => (g["車牌"]||"").toUpperCase().trim() === plate);
                const localTag = isLocal ? `<span class="text-amber-400 text-[9px] bg-amber-500/20 px-1.5 py-0.5 rounded ml-1">本地</span>` : "";

                list.innerHTML += `<div class="p-3 border ${isLocal ? 'border-amber-700/60 bg-amber-950/20' : 'border-slate-700/80 bg-slate-900/40'} rounded-xl space-y-2">
                    <div class="flex justify-between items-center font-bold text-slate-300">
                        <span class="font-mono text-sm tracking-wider">${item["車牌"]}${localTag}</span>
                        <span class="text-slate-500 font-normal text-[10px]">#${index+1}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div><label class="block text-[9px] text-slate-500 mb-0.5">姓名</label>
                            <input type="text" value="${item["姓名"]||''}" onchange="updateField(${index},'姓名',this.value)" class="w-full p-2 bg-slate-800 border border-slate-700 rounded text-slate-200 focus:outline-none focus:border-emerald-500" placeholder="姓名"></div>
                        <div><label class="block text-[9px] text-slate-500 mb-0.5">電話</label>
                            <input type="text" value="${item["電話"]||''}" onchange="updateField(${index},'電話',this.value)" class="w-full p-2 bg-slate-800 border border-slate-700 rounded text-slate-200 focus:outline-none focus:border-emerald-500" placeholder="電話"></div>
                        <div class="col-span-2"><label class="block text-[9px] text-slate-500 mb-0.5">備註</label>
                            <input type="text" value="${item["備註"]||''}" onchange="updateField(${index},'備註',this.value)" class="w-full p-2 bg-slate-800 border border-slate-700 rounded text-slate-200 focus:outline-none focus:border-emerald-500" placeholder="備註"></div>
                        <div class="col-span-2 border-t border-slate-700/40 pt-2 flex justify-between items-center">
                            <span class="text-[10px] text-slate-400">核簽：</span>
                            <div class="flex space-x-3 text-[10px]">
                                <label class="flex items-center space-x-1 cursor-pointer select-none" onclick="toggleAdminCheck(${index},'管理者1')">
                                    <input type="checkbox" ${c1?'checked':''} disabled class="rounded border-slate-600 text-indigo-500 focus:ring-0">
                                    <span class="${c1?'text-indigo-400 font-bold':'text-slate-500'}">主管1</span></label>
                                <label class="flex items-center space-x-1 cursor-pointer select-none" onclick="toggleAdminCheck(${index},'管理者2')">
                                    <input type="checkbox" ${c2?'checked':''} disabled class="rounded border-slate-600 text-indigo-500 focus:ring-0">
                                    <span class="${c2?'text-indigo-400 font-bold':'text-slate-500'}">主管2</span></label>
                                <label class="flex items-center space-x-1 cursor-pointer select-none" onclick="toggleAdminCheck(${index},'管理者3')">
                                    <input type="checkbox" ${c3?'checked':''} disabled class="rounded border-slate-600 text-indigo-500 focus:ring-0">
                                    <span class="${c3?'text-indigo-400 font-bold':'text-slate-500'}">主管3</span></label>
                            </div>
                        </div>
                    </div></div>`;
            });
        }

        // ============================================================
        //  高階長官座車清單 Modal 控制
        // ============================================================
        const VIP_STATIC_LIST = [
            { plate: "AAA-8888", title: "軍醫局局長", unit: "國防部軍醫局" },
            { plate: "TSH-1111", title: "三軍總醫院院長", unit: "三總院本部" },
            { plate: "YQC-9999", title: "永青專案總監", unit: "永青總公司" },
            { plate: "SUP-6830", title: "監造總指派官", unit: "工程監造組" }
        ];

        function openVipListModal() {
            const modal = document.getElementById("vip-modal");
            if (!modal) return;
            
            // 1. 渲染核心必記長官
            const staticDiv = document.getElementById("vip-static-list");
            staticDiv.innerHTML = VIP_STATIC_LIST.map(v => `
                <div class="p-3 bg-amber-950/20 border border-amber-900/40 rounded-xl flex justify-between items-center">
                    <div>
                        <p class="font-black text-amber-300 text-[18px]">${v.title}</p>
                        <p class="text-white text-[15px] font-bold mt-0.5">${v.unit}</p>
                    </div>
                    <span class="font-mono text-[16px] font-black text-amber-300 tracking-wider bg-amber-950/60 px-2.5 py-1 rounded-lg border border-amber-800/40">${v.plate}</span>
                </div>
            `).join("");

            // 2. 篩選資料庫中登記的其他長官車牌 (模糊匹配標題/備註)
            const dynamicDiv = document.getElementById("vip-dynamic-list");
            const dbCountSpan = document.getElementById("vip-db-count");
            const merged = getMergedDatabase();
            
            const keywords = ["長官", "院長", "局長", "總監", "董事", "總經理", "經理", "處長", "主任"];
            const dbVips = merged.filter(i => {
                const remark = (i["備註"] || "").toUpperCase();
                const unit = (i["單位別"] || "").toUpperCase();
                const name = (i["姓名"] || "").toUpperCase();
                const branch = (i["分項"] || "").toUpperCase();
                
                // 排除已經存在於靜態名單中的車牌
                const isStatic = VIP_STATIC_LIST.some(sv => normalizePlate(sv.plate) === normalizePlate(i["車牌"]));
                if (isStatic) return false;

                return keywords.some(k => remark.includes(k) || unit.includes(k) || name.includes(k) || branch.includes(k));
            });

            dbCountSpan.innerText = dbVips.length;

            if (dbVips.length === 0) {
                dynamicDiv.innerHTML = `<p class="text-slate-600 text-center py-4 text-[11px]">資料庫中暫無其他登記的長官車輛</p>`;
            } else {
                dynamicDiv.innerHTML = dbVips.map(v => `
                    <div class="p-3 bg-indigo-950/20 border border-indigo-900/40 rounded-xl flex justify-between items-center">
                        <div>
                            <p class="font-black text-indigo-300 text-[18px]">${v["姓名"] || "長官"}</p>
                            <p class="text-white text-[15px] font-bold mt-0.5">${v["單位別"]} | ${v["備註"] || v["分項"] || "長官車輛"}</p>
                        </div>
                        <span class="font-mono text-[16px] font-black text-indigo-300 tracking-wider bg-indigo-950/60 px-2.5 py-1 rounded-lg border border-indigo-800/40">${v["車牌"]}</span>
                    </div>
                `).join("");
            }

            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function closeVipListModal() {
            const modal = document.getElementById("vip-modal");
            if (modal) {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }
        }
    </script>
